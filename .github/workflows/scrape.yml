# .github/workflows/scrape.yml
# Wardrops — Lebanon Price Tracker (Real Estate + Cars)
# Runs scrapers and deploys the dashboard to GitHub Pages

name: Scrape & Deploy

on:
  schedule:
    # 8AM Beirut (5:00 UTC) — both scrapers
    - cron: '0 5 * * *'
    # 8PM Beirut (17:00 UTC) — both scrapers
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run real estate scraper
        run: python olx_scraper.py

      - name: Run car scraper
        run: python olx_scraper_cars.py

      - name: Commit updated data
        run: |
          git config user.name "OLX Scraper Bot"
          git config user.email "bot@wardrops.lb"
          git add listings_db.json drops_feed.json listings_db_cars.json drops_feed_cars.json
          git diff --staged --quiet || git commit -m "📊 Scrape $(date +%Y-%m-%d\ %H:%M)"
          git push

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest data
        run: git pull origin main

      - name: Prepare site
        run: |
          mkdir -p _site
          cp index.html _site/
          [ -f drops_feed.json ] && cp drops_feed.json _site/ || true
          [ -f drops_feed_cars.json ] && cp drops_feed_cars.json _site/ || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
